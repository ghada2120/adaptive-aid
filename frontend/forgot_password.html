<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body class="center-page">
  <div class="verify-card">
    <h1>Forgot Password</h1>
    <p>Enter your email to receive a reset link</p>

    <input type="email" id="email" placeholder="Enter your email" style="width:100%; padding:12px; margin-bottom:15px; border-radius:10px; border:1px solid #ddd;">

    <button class="btn btn-primary" id="sendBtn">Send Reset Link</button>

    <div class="message" id="msg"></div>
  </div>

  <script src="js/forgot_password.js"></script>
</body>
</html>

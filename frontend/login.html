<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adaptive Aid - Login</title>
    <!-- استدعاء الأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* اللون النيلي الغامق الموحد */
            background-color: #0a0a23; 
            overflow: hidden;
        }

        .login-card {
            width: 390px;
            padding: 45px 35px;
            /* جعل خلفية البطاقة أغمق قليلاً لتتناسب مع الخلفية النيلية */
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
            color: white;
        }

        .logo i {
            font-size: 65px;
            /* تدرج لوني هادئ للأيقونة يناسب اللون النيلي */
            background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        h1 { font-size: 30px; font-weight: 700; margin-bottom: 5px; letter-spacing: 0.5px; }
        
        .subtitle { font-size: 14px; color: rgba(255, 255, 255, 0.5); margin-bottom: 30px; }

        .input-group { text-align: left; margin-bottom: 18px; }

        label { display: block; font-size: 13px; margin-bottom: 8px; color: rgba(255, 255, 255, 0.8); }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 0 15px;
            height: 50px;
            transition: 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: #818cf8;
            background: rgba(255, 255, 255, 0.08);
        }

        .input-wrapper input {
            background: transparent;
            border: none;
            outline: none;
            color: white;
            width: 100%;
            padding-left: 12px;
            font-size: 14px;
        }

        .input-wrapper i { color: rgba(255, 255, 255, 0.4); font-size: 16px; }

        .login-btn {
            width: 100%;
            height: 55px;
            margin-top: 20px;
            border: none;
            border-radius: 30px;
            /* زر بلون نيلي مشرق قليلاً لكي يبرز */
            background: linear-gradient(90deg, #6366f1, #a855f7);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4);
        }

        .forgot { display: block; margin-top: 20px; color: #818cf8; text-decoration: none; font-size: 13px; }

        .register { margin-top: 25px; font-size: 13px; color: rgba(255, 255, 255, 0.4); }

        .register a { color: #818cf8; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">
            <i class="fa-solid fa-graduation-cap"></i>
        </div>
        <h1>Adaptive Aid</h1>
        <p class="subtitle">Login to continue</p>

        <div class="input-group">
            <label>Email</label>
            <div class="input-wrapper">
                <i class="fa-regular fa-envelope"></i>
                <input type="email" placeholder="Enter your email">
            </div>
        </div>

        <div class="input-group">
            <label>Password</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-lock"></i>
                <input type="password" placeholder="Enter your password">
            </div>
        </div>

        <button class="login-btn">Login</button>

        <a href="#" class="forgot">Forgot Password?</a>
        <p class="register">Don't have an account? <a href="#">Register</a></p>
    </div>

</body>
</html>

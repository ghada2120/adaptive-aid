<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adaptive Aid - Login</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <img src="https://i.imgur.com/your-graduation-cap-icon.png" alt="Logo" class="logo-img"> <!-- يمكنك استبدالها بأيقونة FontAwesome -->
                <i class="fas fa-user-graduate graduation-icon"></i>
                <h1>Adaptive Aid</h1>
                <p class="subtitle">Login to continue</p>
            </div>

            <form>
                <div class="input-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <i class="far fa-envelope"></i>
                        <input type="email" placeholder="Enter your email">
                    </div>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" placeholder="Enter your password">
                        <i class="far fa-eye toggle-password"></i>
                    </div>
                </div>

                <button type="submit" class="login-button">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>

            <a href="#" class="forgot-password">Forgot Password?</a>
            <p class="register-text">Don't have an account? <a href="#">Register</a></p>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adaptive Aid - Login</title>
    <!-- استدعاء مكتبة الأيقونات FontAwesome لضمان ظهور الأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* التنسيقات المحدثة لتطابق image_33.png تماماً */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* الخلفية الفلكية الداكنة */
            background: url('https://img.freepik.com/free-vector/dark-galaxy-background-with-stars_23-2148901558.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .login-card {
            background: rgba(15, 15, 35, 0.75); /* تأثير الزجاج الشفاف */
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 50px 40px;
            width: 380px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        /* تنسيق أيقونة قبعة التخرج باللون المتدرج */
        .graduation-icon {
            font-size: 70px;
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        h1 { margin: 10px 0 5px; font-size: 28px; font-weight: 600; }
        .subtitle { color: #aaa; font-size: 14px; margin-bottom: 30px; }

        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; font-size: 14px; margin-bottom: 8px; color: #ddd; }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 12px 15px;
        }

        .input-wrapper i { color: #888; font-size: 16px; }
        .input-wrapper input {
            background: transparent;
            border: none;
            color: white;
            padding-left: 15px;
            width: 100%;
            outline: none;
        }

        /* تنسيق زر الدخول المتدرج */
        .login-button {
            width: 100%;
            padding: 15px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(90deg, #8e2de2, #4a00e0);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .login-button:hover { opacity: 0.9; transform: translateY(-2px); }
        .forgot-password { display: block; margin-top: 20px; color: #8e2de2; text-decoration: none; font-size: 13px; }
        .register-text { margin-top: 30px; font-size: 13px; color: #aaa; }
        .register-text a { color: #4a00e0; text-decoration: none; font-weight: bold; }
        
        /* أيقونة العين لكلمة المرور */
        .toggle-password { cursor: pointer; position: absolute; right: 15px; color: #888; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <!-- أيقونة التخرج بدلاً من اللوجو المكسور -->
                <i class="fas fa-user-graduate graduation-icon"></i>
                <h1>Adaptive Aid</h1>
                <p class="subtitle">Login to continue</p>
            </div>

            <form>
                <div class="input-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <i class="far fa-envelope"></i>
                        <input type="email" placeholder="Enter your email">
                    </div>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" placeholder="Enter your password">
                        <i class="far fa-eye toggle-password"></i>
                    </div>
                </div>

                <button type="submit" class="login-button">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>

            <a href="#" class="forgot-password">Forgot Password?</a>
            <p class="register-text">Don't have an account? <a href="#">Register</a></p>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adaptive Aid - Learning Session</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <script defer src="js/session.js"></script>

  <style>
    body {
      background: #0b0e14;
      background-image: radial-gradient(circle at top right, #1a1f3c, transparent),
                        radial-gradient(circle at bottom left, #121526, transparent);
      color: #ffffff;
      font-family: 'Poppins', sans-serif;
      margin: 0;
      min-height: 100vh;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 30px;
      gap: 20px;
    }

    .course-info h2 {
      color: #fff;
      font-size: 26px;
      margin: 0;
    }

    .course-info p {
      color: rgba(255, 255, 255, 0.5);
      font-size: 14px;
      margin-top: 5px;
    }

    /* Stats Row Glass Design */
    .session-info {
      display: flex;
      gap: 12px;
    }

    .info-item {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      padding: 10px 15px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      text-align: center;
      min-width: 85px;
    }

    .info-item .label {
      color: rgba(255, 255, 255, 0.5);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .info-item .value {
      color: #3d5afe;
      font-size: 18px;
      font-weight: 700;
    }

    /* Feedback Messages */
    .feedback-message {
      padding: 15px 20px;
      border-radius: 14px;
      margin-bottom: 20px;
      display: none;
      font-weight: 500;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .feedback-message.success {
      display: block;
      background: rgba(74, 222, 128, 0.1);
      color: #4ade80;
      border: 1px solid rgba(74, 222, 128, 0.2);
    }

    .feedback-message.error {
      display: block;
      background: rgba(248, 113, 113, 0.1);
      color: #f87171;
      border: 1px solid rgba(248, 113, 113, 0.2);
    }

    /* Difficulty Badge */
    .difficulty-badge {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 20px;
      background: rgba(61, 90, 254, 0.1);
      color: #3d5afe;
      border: 1px solid rgba(61, 90, 254, 0.2);
    }

    /* Question Card Glassmorphism */
    .question-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 28px;
      padding: 40px;
      margin-bottom: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }

    .question-text {
      font-size: 22px;
      color: #fff;
      margin-bottom: 30px;
      line-height: 1.5;
    }

    /* Options List */
    .options-list {
      display: grid;
      gap: 15px;
    }

    .option-item {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 18px;
      padding: 18px 25px;
      display: flex;
      align-items: center;
      gap: 15px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .option-item:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: #3d5afe;
      transform: translateX(5px);
    }

    .option-item.selected {
      background: rgba(61, 90, 254, 0.1);
      border-color: #3d5afe;
      box-shadow: 0 0 15px rgba(61, 90, 254, 0.2);
    }

    .option-prefix {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      flex-shrink: 0;
    }

    /* States for evaluation */
    .option-item.locked { pointer-events: none; }
    .option-item.correct-answer {
      border-color: #4ade80;
      background: rgba(74, 222, 128, 0.15);
    }
    .option-item.wrong-answer {
      border-color: #f87171;
      background: rgba(248, 113, 113, 0.15);
    }

    /* Bottom Actions */
    .action-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 15px;
    }

    .btn {
      padding: 14px 28px;
      border-radius: 25px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: 0.3s;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-primary { background: linear-gradient(90deg, #d83395, #3d5afe); color: white; }
    .btn-secondary { background: rgba(255, 255, 255, 0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1); }
    .btn-danger { background: rgba(248, 113, 113, 0.1); color: #f87171; border: 1px solid rgba(248,113,113,0.2); }

    .btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    @media (max-width: 768px) {
      .header { flex-direction: column; }
      .action-buttons { flex-direction: column; }
      .btn { width: 100%; justify-content: center; }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <div class="course-info">
        <h2 id="testCourseName">Learning Session</h2>
        <p id="testChapterName">Module Material</p>
      </div>

      <div class="session-info">
        <div class="info-item">
          <div class="label">Question</div>
          <div class="value" id="currentQuestion">0/0</div>
        </div>
        <div class="info-item">
          <div class="label">Time</div>
          <div class="value" id="sessionTimer">00:00</div>
        </div>
        <div class="info-item">
          <div class="label">Score</div>
          <div class="value" id="score">0</div>
        </div>
      </div>
    </div>

    <div id="sessionMessage" class="feedback-message"></div>

    <div class="difficulty-badge" id="difficultyBadge">Adaptivity: Ready</div>

    <div class="question-card" id="questionBox">
      <div class="question-text" id="questionText">AI is generating your question...</div>
      <div class="options-list" id="optionsList">
        </div>
    </div>

    <div class="action-buttons">
      <button class="btn btn-danger" id="endSessionBtn">
        <i class="fas fa-times-circle"></i> Quit
      </button>

      <button class="btn btn-secondary" id="skipBtn">
        <i class="fas fa-forward"></i> Skip
      </button>

      <button class="btn btn-primary" id="submitBtn">
        <i class="fas fa-check-circle"></i> Submit Answer
      </button>

      <button class="btn btn-primary" id="nextQuestionBtn" style="display: none;">
        Next Question <i class="fas fa-arrow-right"></i>
      </button>
    </div>
  </div>
</body>
</html>

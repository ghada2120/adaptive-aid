<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adaptive Aid - Session</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">

  <script defer src="js/session.js"></script>

  <style>
  
    .course-info h2 {
      color: #333;
      font-size: 24px;
      margin-bottom: 5px;
    }

    .course-info p {
      color: #666;
      font-size: 14px;
    }

    .session-info {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    .info-item {
      background: white;
      padding: 12px 18px;
      border-radius: 15px;
      min-width: 100px;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    .info-item .label {
      color: #666;
      font-size: 13px;
      margin-bottom: 5px;
    }

    .info-item .value {
      color: #4158D0;
      font-size: 22px;
      font-weight: 700;
    }

    .feedback-message {
      margin-bottom: 18px;
      padding: 14px 18px;
      border-radius: 14px;
      display: none;
      font-weight: 500;
    }

    .feedback-message.success {
      display: block;
      background: #d4edda;
      color: #155724;
    }

    .feedback-message.error {
      display: block;
      background: #f8d7da;
      color: #721c24;
    }

    .difficulty-badge {
      display: inline-block;
      padding: 8px 18px;
      border-radius: 25px;
      font-weight: 600;
      margin-bottom: 18px;
      background: #eef2ff;
      color: #4158D0;
      border: 1px solid rgba(65, 88, 208, 0.15);
    }

    .question-card {
      background: white;
      border-radius: 28px;
      padding: 35px;
      margin-bottom: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .question-card.fade-swap {
      animation: questionFadeSwap 0.35s ease;
    }

    .question-text {
      font-size: 24px;
      color: #333;
      margin-bottom: 25px;
      line-height: 1.6;
    }

    .options-list {
      display: grid;
      gap: 14px;
    }

    .option-item {
      background: #f8f9fa;
      border: 3px solid #e0e0e0;
      border-radius: 18px;
      padding: 18px 22px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .option-item:hover {
      border-color: #4158D0;
      background: #f0f3ff;
      transform: translateY(-1px);
    }

    .option-item.selected {
      border-color: #4158D0;
      background: #f0f3ff;
    }

    .option-prefix {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #4158D0;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      flex-shrink: 0;
    }

    .action-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      flex-wrap: wrap;
    }

    @keyframes questionFadeSwap {
      0% {
        opacity: 0.45;
        transform: translateY(10px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      .container {
        padding: 20px;
      }

      .question-card {
        padding: 24px;
      }

      .question-text {
        font-size: 20px;
      }

      .header {
        flex-direction: column;
        align-items: stretch;
      }

      .session-info {
        justify-content: space-between;
      }

      .info-item {
        flex: 1;
        min-width: 80px;
      }

      .action-buttons {
        justify-content: stretch;
      }

      .action-buttons .btn {
        flex: 1;
      }
    }

.option-item.locked {
  cursor: default;
  pointer-events: none;
}

.option-item.correct-answer {
  border-color: #198754;
  background: #d1e7dd;
}

.option-item.wrong-answer {
  border-color: #dc3545;
  background: #f8d7da;
}
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <div class="course-info">
        <h2 id="testCourseName">Course Name</h2>
        <p id="testChapterName">Material Name</p>
      </div>

      <div class="session-info">
        <div class="info-item">
          <div class="label">Question</div>
          <div class="value" id="currentQuestion">Q1</div>
        </div>

        <div class="info-item">
          <div class="label">Time</div>
          <div class="value" id="sessionTimer">00:00</div>
        </div>

        <div class="info-item">
          <div class="label">Difficulty</div>
          <div class="value" id="difficultyMini">-</div>
        </div>

        <div class="info-item">
          <div class="label">Score</div>
          <div class="value" id="score">0</div>
        </div>
      </div>
    </div>

    <div id="sessionMessage" class="feedback-message"></div>

    <div class="difficulty-badge" id="difficultyBadge">Medium</div>

    <div class="question-card">
      <div class="question-text" id="questionText">Preparing your first question...</div>
      <div class="options-list" id="optionsList"></div>
    </div>

    <div class="action-buttons">
      <button class="btn btn-secondary" id="skipBtn">
        <i class="fas fa-forward"></i> Skip
      </button>

      <button class="btn btn-danger" id="endSessionBtn">
        <i class="fas fa-stop"></i> End Session
      </button>

      <button class="btn btn-primary" id="submitBtn">
        <i class="fas fa-check"></i> Submit
      </button>

      <button class="btn btn-primary" id="nextQuestionBtn" style="display: none;">
        <i class="fas fa-arrow-right"></i> Next Question
        </button>

    </div>
  </div>
</body>
</html>

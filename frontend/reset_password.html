<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body class="center-page">
  <div class="verify-card">
    <h1>Reset Password</h1>

    <input type="password" id="password" placeholder="New Password" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:1px solid #ddd;">

    <button class="btn btn-primary" id="resetBtn">Reset Password</button>

    <div class="message" id="msg"></div>
  </div>

  <div class="password-rules" id="passwordRules">
  <p><strong>Password must contain:</strong></p>
  <ul>
    <li id="rule-length" class="invalid">At least 8 characters</li>
    <li id="rule-uppercase" class="invalid">One uppercase letter</li>
    <li id="rule-lowercase" class="invalid">One lowercase letter</li>
    <li id="rule-number" class="invalid">One number</li>
  </ul>
</div>
  <script src="js/reset_password.js"></script>
</body>
</html>

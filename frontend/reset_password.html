<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Adaptive Aid - Reset Password</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />

  <style>
    body {
      background: #0b0e14;
      background-image: radial-gradient(circle at top right, #1a1f3c, transparent),
                        radial-gradient(circle at bottom left, #121526, transparent);
      color: #ffffff;
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    /* Glassmorphism Card */
    .reset-card {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 28px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
    }

    .logo-badge {
      width: 65px;
      height: 65px;
      background: rgba(61, 90, 254, 0.1);
      border: 2px solid rgba(61, 90, 254, 0.3);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto 20px;
    }

    .logo-badge i {
      font-size: 28px;
      color: #3d5afe;
    }

    h1 {
      font-size: 26px;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .auth-subtitle {
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      margin-bottom: 25px;
    }

    /* Input Styling */
    .input-group {
      position: relative;
      margin-bottom: 20px;
      text-align: left;
    }

    .input-group i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.5);
    }

    .auth-input {
      width: 100%;
      padding: 14px 15px 14px 45px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      color: #fff;
      font-size: 15px;
      outline: none;
      box-sizing: border-box;
      transition: 0.3s;
    }

    .auth-input:focus {
      border-color: #3d5afe;
      background: rgba(255, 255, 255, 0.12);
    }

    /* Password Rules (Same as Register) */
    .password-rules {
      margin-top: 15px;
      padding: 15px;
      border-radius: 16px;
      background: rgba(0, 0, 0, 0.2);
      font-size: 12px;
      text-align: left;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .password-rules p {
      margin-bottom: 8px;
      color: rgba(255, 255, 255, 0.9);
      font-weight: 600;
    }

    .password-rules ul {
      padding-left: 0;
      list-style: none;
      margin: 0;
    }

    .password-rules li {
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(255, 255, 255, 0.4);
    }

    .password-rules li.valid {
      color: #4ade80;
    }

    /* Button */
    .btn-primary {
      background: linear-gradient(90deg, #d83395, #3d5afe);
      border: none;
      border-radius: 25px;
      color: white;
      padding: 14px;
      width: 100%;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 25px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      transition: 0.3s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(216, 51, 149, 0.3);
    }

    .message {
      margin-top: 15px;
      font-size: 13px;
    }
  </style>
</head>

<body>

  <div class="reset-card">
    <div class="logo-badge">
      <i class="fas fa-key"></i>
    </div>

    <h1>Reset Password</h1>

    <p class="auth-subtitle">
      Secure your account with a new password
    </p>

    <div class="input-group">
      <i class="fas fa-lock"></i>
      <input
        type="password"
        id="password"
        class="auth-input"
        placeholder="Enter new password"
        autocomplete="new-password"
      />
    </div>

    <div class="password-rules" id="passwordRules">
      <p>Security requirements:</p>
      <ul>
        <li id="rule-length" class="invalid">
          <i class="fas fa-circle" style="font-size: 8px;"></i> At least 8 characters
        </li>
        <li id="rule-uppercase" class="invalid">
          <i class="fas fa-circle" style="font-size: 8px;"></i> One uppercase letter
        </li>
        <li id="rule-lowercase" class="invalid">
          <i class="fas fa-circle" style="font-size: 8px;"></i> One lowercase letter
        </li>
        <li id="rule-number" class="invalid">
          <i class="fas fa-circle" style="font-size: 8px;"></i> One number
        </li>
      </ul>
    </div>

    <button class="btn btn-primary" id="resetBtn">
      Confirm New Password
    </button>

    <div class="message" id="msg"></div>
  </div>

  <script src="js/reset_password.js"></script>

</body>
</html>

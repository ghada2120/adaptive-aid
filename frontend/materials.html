<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adaptive Aid - Materials</title>

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles.css">

  <script defer src="js/materials.js"></script>

  <style>
    
    .selection-section {
      background: #f8f9fa;
      border-radius: 25px;
      padding: 25px;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      color: #333;
      font-size: 20px;
      font-weight: 600;
    }

    .section-title i {
      color: #4158D0;
      font-size: 24px;
    }

    .files-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .file-icon {
      width: 45px;
      height: 45px;
      border-radius: 12px;
      background: #f0f3ff;
      color: #4158D0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .file-info h4 {
      color: #333;
      font-size: 15px;
      margin-bottom: 5px;
    }

    .file-info p {
      color: #666;
      font-size: 13px;
    }

    .ai-generating {
      background: linear-gradient(145deg, #4158D0, #C850C0);
      color: white;
      padding: 15px;
      border-radius: 15px;
      display: none;
      align-items: center;
      gap: 10px;
      margin-top: 15px;
      font-weight: 500;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top: 2px solid white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .fa-file-pdf { color: #dc3545; }
    .fa-file-word { color: #0d6efd; }
    .fa-file-powerpoint { color: #fd7e14; }

.delete-material-btn {
  width: 36px;
  height: 36px;
  min-width: 36px;
  min-height: 36px;

  flex: 0 0 36px;

  border: none;
  border-radius: 50%;

  background: #ffe5e5;
  color: #dc3545;

  display: flex;
  align-items: center;
  justify-content: center;

  cursor: pointer;
  transition: all 0.2s ease;
}

.delete-material-btn:hover {
  background: #dc3545;
  color: white;
  transform: scale(1.08);
}

  </style>
</head>

<body>
  <div class="container">
    <div class="topbar">
      <div>
        <h1 id="courseTitle">Course Materials</h1>
        <p>Select one material to generate a session</p>
      </div>

      <button type="button" class="btn btn-secondary" id="backToCoursesBtn">
        <i class="fas fa-arrow-left"></i> Back to Courses
      </button>
    </div>

    <div id="materialsMessage" class="message"></div>

    <div class="selection-section">
      <div class="section-title">
        <i class="fas fa-book"></i>
        <span id="materialsSectionTitle">Course Materials</span>
      </div>

      <div class="files-grid" id="filesGrid"></div>

      
      <div class="ai-generating" id="aiGenerating">
        <div class="spinner"></div>
        <span>Preparing your session...</span>
      </div>

      <div class="actions">
        <button type="button" class="btn btn-secondary" id="uploadMaterialBtn">
          <i class="fas fa-upload"></i> Upload Material to Course
        </button>

        <button type="button" class="btn btn-primary" id="startSessionBtn" disabled>
          <i class="fas fa-play"></i> Start Session
        </button>
      </div>
    </div>
  </div>

  <input type="file" id="fileInput" style="display: none;" />

  <div id="deleteModal" class="modal hidden">
  <div class="modal-content">
    <h3>Delete Material</h3>
    <p>Are you sure you want to delete this material?</p>

    <div class="modal-actions">
      <button id="cancelDeleteBtn" class="btn cancel">Cancel</button>
      <button id="confirmDeleteBtn" class="btn danger">Delete</button>
    </div>
  </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adaptive Aid - Materials</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css">

  <script defer src="js/materials.js"></script>

  <style>
    body {
      background: #0b0e14;
      background-image: radial-gradient(circle at top right, #1a1f3c, transparent),
                        radial-gradient(circle at bottom left, #121526, transparent);
      color: #ffffff;
      font-family: 'Poppins', sans-serif;
      margin: 0;
      min-height: 100vh;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }

    .topbar h1 {
      font-size: 2rem;
      margin: 0;
      background: linear-gradient(to right, #fff, #a5a5a5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .topbar p {
      color: rgba(255, 255, 255, 0.6);
      margin-top: 5px;
    }

    /* Selection Section Glass Effect */
    .selection-section {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 28px;
      padding: 30px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 25px;
      color: #fff;
      font-size: 22px;
      font-weight: 600;
    }

    .section-title i {
      color: #3d5afe;
      font-size: 26px;
    }

    /* Files Grid Layout */
    .files-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    /* Material Item Style (to be rendered by JS) */
    .material-item {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 18px;
      padding: 15px;
      display: flex;
      align-items: center;
      gap: 15px;
      transition: 0.3s ease;
      cursor: pointer;
    }

    .material-item:hover {
      background: rgba(255, 255, 255, 0.12);
      transform: translateY(-3px);
      border-color: #3d5afe;
    }

    .material-item.selected {
      border-color: #d83395;
      background: rgba(216, 51, 149, 0.1);
    }

    .file-icon {
      width: 50px;
      height: 50px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .file-info h4 {
      color: #fff;
      font-size: 15px;
      margin: 0 0 4px 0;
    }

    .file-info p {
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
      margin: 0;
    }

    /* AI Loading State */
    .ai-generating {
      background: linear-gradient(90deg, #d83395, #3d5afe);
      color: white;
      padding: 18px;
      border-radius: 15px;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 20px;
      font-weight: 500;
      box-shadow: 0 4px 15px rgba(61, 90, 254, 0.3);
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top: 3px solid white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Buttons and Actions */
    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 15px;
      flex-wrap: wrap;
      margin-top: 25px;
    }

    .btn {
      border-radius: 25px;
      padding: 12px 25px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
      border: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(90deg, #d83395, #3d5afe);
      color: white;
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      filter: grayscale(1);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    /* Icons for File Types */
    .fa-file-pdf { color: #ff4d4d; }
    .fa-file-word { color: #4d94ff; }
    .fa-file-powerpoint { color: #ff944d; }

    /* Delete Button Styling */
    .delete-material-btn {
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 50%;
      background: rgba(220, 53, 69, 0.1);
      color: #dc3545;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin-left: auto;
      transition: 0.2s ease;
    }

    .delete-material-btn:hover {
      background: #dc3545;
      color: white;
    }

    /* Modal Styling */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-content {
      background: #161b22;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 35px;
      border-radius: 28px;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .hidden { display: none; }

    .modal-actions {
      display: flex;
      gap: 15px;
      margin-top: 25px;
    }

    .modal-actions button {
      flex: 1;
    }

    .btn.danger {
      background: #dc3545;
      color: white;
    }

  </style>
</head>

<body>
  <div class="container">
    <div class="topbar">
      <div>
        <h1 id="courseTitle">Course Materials</h1>
        <p>Select one material to generate your AI session</p>
      </div>

      <button type="button" class="btn btn-secondary" id="backToCoursesBtn">
        <i class="fas fa-arrow-left"></i> Back to Courses
      </button>
    </div>

    <div id="materialsMessage" class="message"></div>

    <div class="selection-section">
      <div class="section-title">
        <i class="fas fa-book-open"></i>
        <span id="materialsSectionTitle">Learning Materials</span>
      </div>

      <div class="files-grid" id="filesGrid">
        </div>

      <div class="ai-generating" id="aiGenerating">
        <div class="spinner"></div>
        <span>AI is analyzing and preparing your session...</span>
      </div>

      <div class="actions">
        <button type="button" class="btn btn-secondary" id="uploadMaterialBtn">
          <i class="fas fa-upload"></i> Upload New File
        </button>

        <button type="button" class="btn btn-primary" id="startSessionBtn" disabled>
          <i class="fas fa-magic"></i> Start AI Session
        </button>
      </div>
    </div>
  </div>

  <input type="file" id="fileInput" style="display: none;" />

  <div id="deleteModal" class="modal hidden">
    <div class="modal-content">
      <i class="fas fa-exclamation-triangle" style="font-size: 40px; color: #dc3545; margin-bottom: 15px;"></i>
      <h3 style="color: #fff; margin-bottom: 10px;">Delete Material</h3>
      <p style="color: rgba(255,255,255,0.6); margin-bottom: 20px;">Are you sure you want to permanently remove this material?</p>

      <div class="modal-actions">
        <button id="cancelDeleteBtn" class="btn btn-secondary">Cancel</button>
        <button id="confirmDeleteBtn" class="btn danger">Delete</button>
      </div>
    </div>
  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adaptive Aid - Register</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">

  <script defer src="js/register.js"></script>

  <style>
    
    .auth-card {
      width: 100%;
      max-width: 480px;
      background: rgba(255,255,255,0.96);
      border-radius: 30px;
      padding: 35px;
      box-shadow: 0 30px 50px rgba(0,0,0,0.2);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 25px;
    }

    .auth-header h1 {
      color: #333;
      font-size: 30px;
      margin-bottom: 8px;
    }

    .auth-header p {
      color: #666;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 7px;
      color: #333;
      font-weight: 600;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 13px 15px;
      border: 2px solid #ddd;
      border-radius: 14px;
      font-family: inherit;
      font-size: 15px;
      outline: none;
      transition: 0.2s ease;
    }

    .form-group input:focus {
      border-color: #4158D0;
      box-shadow: 0 0 0 4px rgba(65, 88, 208, 0.12);
    }

    .password-rules {
      margin-top: 9px;
      padding: 12px 14px;
      border-radius: 14px;
      background: #f8f9fa;
      font-size: 13px;
      color: #666;
    }

    .password-rules p {
      margin-bottom: 6px;
      color: #333;
    }

    .password-rules ul {
      padding-left: 18px;
    }

    .password-rules li {
      margin-bottom: 4px;
    }

    .password-rules li.valid {
      color: #198754;
    }

    .password-rules li.invalid {
      color: #dc3545;
    }

    .btn-primary:active {
      transform: scale(0.97);
      box-shadow: 0 4px 10px rgba(65, 88, 208, 0.2);
    }

    .btn.loading {
      opacity: 0.75;
      cursor: wait;
      transform: scale(0.98);
      box-shadow: none;
    }

    .auth-footer {
      text-align: center;
      margin-top: 18px;
      color: #666;
      font-size: 14px;
    }

    .auth-footer a {
      color: #4158D0;
      font-weight: 600;
      text-decoration: none;
    }
    .message.flash {
      animation: messageFlash 0.25s ease;
    }

@keyframes messageFlash {
  0% {
    opacity: 0;
    transform: translateY(-4px);
  }
  100% {
    opacity: 1;
    transform: translateY(0);
  }
}

.auth-card .btn {
  width: 100%;
  justify-content: center;
  padding: 14px 22px;
}
  </style>
</head>

<body class="center-page">
    <div class="auth-card">
    <div class="auth-header">
      <h1>Create Account</h1>
      <p>Register to start using Adaptive Aid</p>
    </div>

    <div id="registerMessage" class="message"></div>

    <form id="registerForm">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Enter your name" required />
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Create a password" required />

        <div class="password-rules" id="passwordRules">
          <p><strong>Password must contain:</strong></p>
          <ul>
            <li id="rule-length" class="invalid">At least 8 characters</li>
            <li id="rule-uppercase" class="invalid">One uppercase letter</li>
            <li id="rule-lowercase" class="invalid">One lowercase letter</li>
            <li id="rule-number" class="invalid">One number</li>
          </ul>
        </div>
      </div>

      <button type="submit" class="btn btn-primary" id="registerBtn">
        <i class="fas fa-user-check"></i> Register
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Login</a>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adaptive Aid - Report History</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">

  <script defer src="js/report_history.js"></script>

  <style>

    .reports-list {
      display: grid;
      gap: 16px;
    }

    .report-info h3 {
      color: #333;
      margin-bottom: 6px;
    }

    .report-info p {
      color: #666;
      font-size: 14px;
    }

    .score-badge {
      background: #eef2ff;
      color: #4158D0;
      padding: 10px 16px;
      border-radius: 999px;
      font-weight: 700;
    }

    .empty-card {
      background: white;
      border-radius: 20px;
      padding: 25px;
      color: #666;
      text-align: center;
    }

  </style>
</head>

<body>
  <div class="container">
    <div class="topbar">
      <div>
        <h1 id="historyTitle">Report History</h1>
        <p id="historySubtitle">Previous evaluation reports for this course</p>
      </div>

      <button class="btn btn-secondary" id="backToCoursesBtn">
        <i class="fas fa-arrow-left"></i> Back to Courses
      </button>
    </div>

    <div id="historyMessage" class="message"></div>

    <div class="reports-list" id="reportsList"></div>
  </div>
</body>
</html>

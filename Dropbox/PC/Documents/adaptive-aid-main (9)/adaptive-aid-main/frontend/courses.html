<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <title>Adaptive Aid - Courses</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">

  <script defer src="js/courses.js"></script>

  <style>
    /* التنسيقات الأساسية لتطابق التصميم الزجاجي */
    body {
      background: #0b0e14;
      background-image: radial-gradient(circle at top right, #1a1f3c, transparent),
                        radial-gradient(circle at bottom left, #121526, transparent);
      color: #ffffff;
      font-family: 'Poppins', sans-serif;
      margin: 0;
      min-height: 100vh;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }

    .topbar h1 {
      font-size: 2rem;
      margin: 0;
      background: linear-gradient(to right, #fff, #a5a5a5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .topbar p {
      color: rgba(255, 255, 255, 0.6);
      margin-top: 5px;
    }

    /* زر الخروج بتصميم بسيط */
    #logoutBtn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      padding: 10px 20px;
      border-radius: 12px;
      cursor: pointer;
      backdrop-filter: blur(5px);
      transition: 0.3s;
    }

    #logoutBtn:hover {
      background: rgba(220, 53, 69, 0.2);
      border-color: #dc3545;
    }

    /* صندوق إضافة كورس جديد - Glassmorphism */
    .add-course-box {
      margin-bottom: 35px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 30px;
      border-radius: 24px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }

    .add-course-box h3 {
      margin-bottom: 20px;
      color: #fff;
      font-weight: 500;
    }

    .add-course-form {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    /* المدخلات لتطابق صورة تسجيل الدخول */
    .add-course-form input {
      flex: 1;
      min-width: 220px;
      padding: 14px 18px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      color: #fff;
      font-family: inherit;
      outline: none;
      transition: 0.3s;
    }

    .add-course-form input:focus {
      border-color: #3d5afe;
      background: rgba(255, 255, 255, 0.12);
    }

    /* الزر بنفس التدرج في الصورة */
    .btn-primary {
      background: linear-gradient(90deg, #d83395, #3d5afe);
      border: none;
      border-radius: 25px;
      color: white;
      padding: 12px 25px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      transform: scale(1.03);
      box-shadow: 0 0 20px rgba(61, 90, 254, 0.4);
    }

    /* شبكة الكورسات */
    .courses-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 25px;
    }

    /* تصميم كارت الكورس (يتم إنشاؤه بواسطة JS) */
    .course-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 25px;
      transition: 0.3s ease;
      cursor: pointer;
    }

    .course-card:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: translateY(-5px);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .course-icon {
      width: 50px;
      height: 50px;
      border-radius: 14px;
      background: rgba(61, 90, 254, 0.2);
      color: #3d5afe;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      margin-bottom: 15px;
    }

    .course-card h3 {
      color: #fff;
      margin-bottom: 8px;
    }

    .course-hint {
      color: rgba(255, 255, 255, 0.5);
      font-size: 14px;
    }

    .course-stats {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 16px;
      padding: 15px;
      margin-top: 15px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 14px;
    }

    .stat-row span { color: rgba(255, 255, 255, 0.6); }
    .stat-row strong { color: #3d5afe; }

    .setup-session-btn {
      background: linear-gradient(90deg, #d83395, #3d5afe);
      color: white;
      margin-top: 15px;
    }

    .history-btn {
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.1);
      margin-top: 10px;
    }

    /* تصميم المودال (النافذة المنبثقة) */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-content {
      background: #161b22;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 30px;
      border-radius: 24px;
      max-width: 400px;
      text-align: center;
    }

    .hidden { display: none; }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn.cancel { background: #333; color: white; }
    .btn.danger { background: #dc3545; color: white; }

  </style>
</head>

<body>
  <div class="container">
    <div class="topbar">
      <div>
        <h1>Your Courses</h1>
        <p>Manage your academic progress with ease.</p>
      </div>

      <button id="logoutBtn">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </div>

    <div id="coursesMessage" class="message"></div>

    <div class="add-course-box">
      <h3>Add New Course</h3>

      <form id="addCourseForm" class="add-course-form">
        <input type="text" id="courseName" placeholder="Enter course name (e.g. Computer Science)" required />

        <button type="submit" class="btn btn-primary">
          <i class="fas fa-plus"></i> Add Course
        </button>
      </form>
    </div>

    <div class="courses-grid" id="coursesGrid">
        </div>
  </div>

  <div id="deleteCourseModal" class="modal hidden">
    <div class="modal-content">
      <h3>Delete Course</h3>
      <p style="color: rgba(255,255,255,0.6)">Are you sure you want to delete this course? This action cannot be undone.</p>
      <div class="modal-actions">
        <button id="cancelDeleteCourseBtn" class="btn-primary cancel" style="flex: 1;">Cancel</button>
        <button id="confirmDeleteCourseBtn" class="btn-primary danger" style="flex: 1; background: #dc3545;">Delete</button>
      </div>
    </div>
  </div>
</body>
</html>

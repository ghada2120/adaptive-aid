<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adaptive Aid - Login</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <script defer src="js/login.js"></script>
  
  <style>
    body {
      background: #0b0e14;
      background-image: radial-gradient(circle at top right, #1a1f3c, transparent),
                        radial-gradient(circle at bottom left, #121526, transparent);
      color: #ffffff;
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    /* Glassmorphism Container */
    .auth-container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 28px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
    }

    /* Logo Header */
    .logo-section {
      margin-bottom: 30px;
    }

    .logo-badge {
      width: 70px;
      height: 70px;
      background: rgba(61, 90, 254, 0.1);
      border: 2px solid rgba(61, 90, 254, 0.3);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto 15px;
      box-shadow: 0 0 20px rgba(61, 90, 254, 0.2);
    }

    .logo-badge i {
      font-size: 30px;
      color: #3d5afe;
    }

    .logo-section h1 {
      font-size: 28px;
      margin: 0;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .logo-section p {
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      margin-top: 5px;
    }

    /* Form Fields */
    .form-group {
      position: relative;
      margin-bottom: 20px;
      text-align: left;
    }

    .form-group i.field-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.5);
    }

    .form-group i.toggle-password {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.5);
      cursor: pointer;
    }

    .auth-input {
      width: 100%;
      padding: 14px 45px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      color: #fff;
      font-size: 15px;
      outline: none;
      box-sizing: border-box;
      transition: 0.3s;
    }

    .auth-input:focus {
      border-color: #3d5afe;
      background: rgba(255, 255, 255, 0.12);
    }

    /* Main Login Button */
    .btn-login {
      background: linear-gradient(90deg, #d83395, #3d5afe);
      border: none;
      border-radius: 25px;
      color: white;
      padding: 14px;
      width: 100%;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-login:hover {
      transform: scale(1.02);
      box-shadow: 0 5px 15px rgba(216, 51, 149, 0.3);
    }

    /* Helper Links */
    .helper-links {
      margin-top: 20px;
    }

    .forgot-link {
      display: inline-block;
      color: #3d5afe;
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 25px;
    }

    .footer-text {
      color: rgba(255, 255, 255, 0.8);
      font-size: 14px;
    }

    .footer-text a {
      color: #3d5afe;
      text-decoration: none;
      font-weight: 600;
    }

    .message {
      margin-top: 15px;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <div class="logo-section">
      <div class="logo-badge">
        <i class="fas fa-graduation-cap"></i>
      </div>
      <h1>Adaptive Aid</h1>
      <p>Login to continue</p>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <i class="fas fa-user field-icon"></i>
        <input id="email" name="email" type="email" class="auth-input" placeholder="Enter your email" required />
      </div>

      <div class="form-group">
        <i class="fas fa-lock field-icon"></i>
        <input id="password" name="password" type="password" class="auth-input" placeholder="Enter your password" required />
        <i class="fas fa-eye toggle-password"></i>
      </div>

      <button type="submit" class="btn-login" id="loginBtn">
        <i class="fas fa-arrow-right"></i> Login
      </button>

      <div class="helper-links">
        <a href="forgot_password.html" class="forgot-link">Forgot Password?</a>
        <div class="footer-text">
          Don’t have an account? <a href="register.html">Register</a>
        </div>
      </div>
      
      <div id="loginMessage" class="message"></div>
    </form>
  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Adaptive Aid - Forgot Password</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />

  <style>
    body {
      background: #0b0e14;
      background-image: radial-gradient(circle at top right, #1a1f3c, transparent),
                        radial-gradient(circle at bottom left, #121526, transparent);
      color: #ffffff;
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    /* Glassmorphism Card */
    .auth-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 28px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
    }

    /* Circular Logo Style */
    .logo-container {
      width: 70px;
      height: 70px;
      background: rgba(61, 90, 254, 0.1);
      border: 2px solid rgba(61, 90, 254, 0.3);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto 20px;
      box-shadow: 0 0 20px rgba(61, 90, 254, 0.2);
    }

    .logo-container i {
      font-size: 30px;
      color: #3d5afe;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .auth-subtitle {
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      margin-bottom: 30px;
      line-height: 1.5;
    }

    /* Input Field Styling */
    .input-group {
      position: relative;
      margin-bottom: 20px;
    }

    .input-group i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.5);
    }

    .auth-input {
      width: 100%;
      padding: 14px 15px 14px 45px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      color: #fff;
      font-size: 15px;
      outline: none;
      box-sizing: border-box;
      transition: 0.3s;
    }

    .auth-input:focus {
      border-color: #3d5afe;
      background: rgba(255, 255, 255, 0.12);
    }

    /* Gradient Button */
    .btn-primary {
      background: linear-gradient(90deg, #d83395, #3d5afe);
      border: none;
      border-radius: 25px;
      color: white;
      padding: 14px;
      width: 100%;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(216, 51, 149, 0.3);
    }

    .back-link {
      margin-top: 20px;
      display: block;
      color: #3d5afe;
      text-decoration: none;
      font-size: 14px;
      transition: 0.3s;
    }

    .back-link:hover {
      text-shadow: 0 0 8px rgba(61, 90, 254, 0.6);
    }

    .message {
      margin-top: 15px;
      font-size: 13px;
    }
  </style>
</head>

<body>

  <div class="auth-card">
    <div class="logo-container">
      <i class="fas fa-graduation-cap"></i>
    </div>

    <h1>Adaptive Aid</h1>
    <p class="auth-subtitle">
      Reset your password to continue
    </p>

    <div class="input-group">
      <i class="fas fa-envelope"></i>
      <input
        type="email"
        id="email"
        class="auth-input"
        placeholder="Enter your email"
        autocomplete="email"
      />
    </div>

    <button class="btn btn-primary" id="sendBtn">
      <span>Send Reset Link</span>
      <i class="fas fa-paper-plane" style="font-size: 14px;"></i>
    </button>

    <div class="message" id="msg"></div>

    <a href="login.html" class="back-link">Back to Login</a>
  </div>

  <script src="js/forgot_password.js"></script>

</body>
</html>
